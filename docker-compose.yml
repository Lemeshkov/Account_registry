services:
  postgres:
    image: postgres:15-alpine
    container_name: registry_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-account_registry}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-account_registry}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - registry_network
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    container_name: registry_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - registry_network
    env_file:
      - .env

volumes:
  postgres_data:

networks:
  registry_network:
    driver: bridge